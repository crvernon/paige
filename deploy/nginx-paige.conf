# Nginx server block for the PAIGE application on Ubuntu EC2.
#
# Serves the built React SPA from /var/www/paige and reverse-proxies API calls
# to the FastAPI (uvicorn) service listening on 127.0.0.1:8000.
#
# Install:
#   sudo cp deploy/nginx-paige.conf /etc/nginx/sites-available/paige
#   sudo ln -s /etc/nginx/sites-available/paige /etc/nginx/sites-enabled/paige
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # replace with your domain, e.g. paige.example.com

    # Allow reasonably large PDF uploads.
    client_max_body_size 50m;

    root /var/www/paige;
    index index.html;

    # API -> FastAPI/uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # LLM calls can be slow
        proxy_send_timeout 300s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
